# CI that is itself a zkML demo.
#
# On every push / PR we, for each example agent:
#   1. compile its ZK circuit and keys,
#   2. generate a fresh receipt (real EZKL/Halo2 proof),
#   3. verify that receipt with only the public verifying key,
#   4. confirm tampering is detected.
# The job fails if any verification fails. A green run therefore means
# every example produced a genuinely verified zero-knowledge receipt.
name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  proofs:
    name: generate & verify example receipts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install zkml-trail
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build example models
        run: python scripts/make_example_models.py

      - name: Unit tests
        run: python -m pytest -q

      - name: Trading agent — prove & verify
        run: examples/trading-agent/verify.sh

      - name: Moderation agent — prove & verify
        run: examples/moderation-agent/verify.sh

      - name: Hiring agent — prove & verify
        run: examples/hiring-agent/verify.sh

      - name: Tamper check — a modified receipt must FAIL verification
        run: |
          set -e
          cd examples/trading-agent
          export ZKML_TRAIL_HOME="$(pwd)/.gen"
          VK="$(ls "$ZKML_TRAIL_HOME"/agents/*/vk.key | head -1)"
          python - <<'PY'
          import json
          r = json.load(open("receipt.json"))
          r["decision"]["decision"] = "TAMPERED"
          r["decision"]["output"] = [9.9, -9.9]
          json.dump(r, open("tampered.json", "w"))
          PY
          if zkml-trail verify tampered.json --vk "$VK" --json; then
            echo "::error::Tampered receipt verified — this must never happen."
            exit 1
          else
            echo "Tampered receipt correctly rejected. ✓"
          fi

      - name: Summary
        run: echo "✅ All example receipts generated and verified by ZK proof."
